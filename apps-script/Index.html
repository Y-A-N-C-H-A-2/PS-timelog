<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PS Daily Time Check-in</title>
<style>
  :root{
    --navy:#1F3864; --steel:#2E5090; --bg:#F7F8FB; --card:#FFFFFF;
    --ink:#1F2937; --muted:#64748B; --line:#E2E8F0;
    --bill:#15803D; --bill-bg:#ECFDF3; --nonbill:#B45309; --nonbill-bg:#FEF6EC;
    --danger:#B42318;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Arial,"Segoe UI",system-ui,sans-serif;font-size:15px;line-height:1.45;}
  .wrap{max-width:640px;margin:0 auto;padding:0 18px 140px;}
  header.top{background:var(--navy);color:#fff;border-radius:0 0 14px 14px;
    padding:20px 22px 18px;margin:0 -18px 22px;}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#AEC2E6;margin:0 0 4px}
  header.top h1{margin:0;font-size:21px;font-weight:700;letter-spacing:-.01em}
  header.top p{margin:6px 0 0;color:#CBD7EC;font-size:13px}
  .tabs{display:flex;gap:6px;margin-top:16px}
  .tab{flex:0 0 auto;background:rgba(255,255,255,.12);color:#fff;border:0;cursor:pointer;
    padding:8px 16px;border-radius:8px;font:inherit;font-size:13.5px;font-weight:600}
  .tab.active{background:#fff;color:var(--navy)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:18px;margin:0 0 14px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row > .field{flex:1 1 0;min-width:0}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 5px}
  .req::after{content:" *";color:var(--danger)}
  input,select,textarea{width:100%;font:inherit;color:var(--ink);background:#fff;
    border:1px solid var(--line);border-radius:8px;padding:9px 10px}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--steel);outline-offset:0;border-color:var(--steel)}
  textarea{resize:vertical;min-height:54px}
  .field{margin-bottom:12px}
  .field:last-child{margin-bottom:0}
  .proj{position:relative}
  .proj-head{display:flex;align-items:center;justify-content:space-between;margin:0 0 14px}
  .proj-tag{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--navy);background:#EEF3FB;padding:4px 10px;border-radius:999px}
  .remove{background:none;border:0;color:var(--danger);font:inherit;font-size:12.5px;
    cursor:pointer;font-weight:600;padding:4px}
  .hours-pair .field{margin-bottom:0}
  .otherbox{margin-top:8px}
  .add{width:100%;background:#fff;border:1.5px dashed #B9C5DA;color:var(--navy);
    font:inherit;font-weight:600;font-size:14px;padding:12px;border-radius:10px;cursor:pointer}
  .add:hover{background:#F2F6FC}
  .add:disabled{opacity:.45;cursor:not-allowed}
  .tally{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
    box-shadow:0 -2px 10px rgba(16,24,40,.06)}
  .tally .inner{max-width:640px;margin:0 auto;padding:12px 18px;
    display:flex;align-items:center;gap:14px}
  .chip{font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:8px;white-space:nowrap}
  .chip.b{color:var(--bill);background:var(--bill-bg)}
  .chip.n{color:var(--nonbill);background:var(--nonbill-bg)}
  .chip.t{color:var(--navy);background:#EEF3FB}
  .grow{flex:1 1 auto}
  .submit{background:var(--navy);color:#fff;border:0;font:inherit;font-weight:700;font-size:15px;
    padding:11px 22px;border-radius:9px;cursor:pointer}
  .submit:hover{background:#16294a}
  .submit:disabled{opacity:.5;cursor:not-allowed}
  .hint{font-size:12px;color:var(--muted);margin:6px 2px 0}
  .err{color:var(--danger);font-size:12.5px;margin:8px 2px 0;display:none}
  .warnbar{background:#FEF6EC;border:1px solid #F0D9B5;border-radius:10px;
    padding:11px 14px;margin:0 0 14px;font-size:12.5px;color:#8a5a12}
  /* responses */
  .stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .stat{flex:1 1 120px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .stat .n{font-size:22px;font-weight:700;color:var(--navy)}
  .stat .l{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 9px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700}
  .tbl-wrap{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:10px}
  .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .btn{background:#fff;border:1px solid var(--line);color:var(--navy);font:inherit;font-weight:600;
    font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer}
  .btn:hover{background:#F2F6FC}
  .btn.warn{color:var(--danger);border-color:#F1C7C2}
  .empty{text-align:center;color:var(--muted);padding:40px 12px}
  .success{text-align:center;padding:34px 18px}
  .success .tick{width:54px;height:54px;border-radius:50%;background:var(--bill-bg);color:var(--bill);
    display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px}
  .success h2{margin:0 0 6px;color:var(--navy)}
  .hidden{display:none!important}
  @media (prefers-reduced-motion:no-preference){.card,.success{animation:fade .25s ease}}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media(max-width:520px){.row>.field{flex-basis:100%}}
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <p class="eyebrow">Nostra · Professional Services</p>
    <h1>Daily Time Check-in</h1>
    <p id="subhead">Log what you worked on today — takes about a minute.</p>
    <div class="tabs">
      <button class="tab active" id="tab-log" onclick="setView('log')">Log time</button>
      <button class="tab" id="tab-resp" onclick="setView('resp')">Responses</button>
    </div>
  </header>

  <!-- LOG VIEW -->
  <div id="view-log">
    <div id="offline-warn" class="warnbar hidden">
      This page isn't connected to the time-log backend. Open the form through its
      published web-app link to submit.
    </div>
    <div id="form-area">
      <div class="card">
        <div class="row">
          <div class="field">
            <label class="req" for="eng">Your name</label>
            <select id="eng" onchange="toggleOtherName()">
              <option value="">Select…</option>
              <option>Adam Waring</option><option>Damir Juric</option><option>Darragh Daly</option>
              <option>David Maher</option><option>John Connole</option><option>John Hanrahan</option>
              <option>JP Cuddihy</option><option>Lukasz Pazurek</option><option>Mark Bennett</option>
              <option>Matthew Gordon</option><option>Octavian Vesa</option><option>Oisin O'Hare</option>
              <option>Paul Donnelly</option><option>Reinier Hoogers</option><option>Sheen Kurian</option>
              <option value="__other">Other…</option>
            </select>
            <input id="engOther" class="otherbox hidden" placeholder="Type your name">
          </div>
          <div class="field">
            <label class="req" for="date">Date</label>
            <input type="date" id="date">
          </div>
        </div>
      </div>

      <div id="projects"></div>

      <button class="add" id="addBtn" onclick="addProject()">+ Add another project</button>
      <p class="err" id="formErr"></p>
    </div>

    <div id="success" class="hidden"></div>
  </div>

  <!-- RESPONSES VIEW -->
  <div id="view-resp" class="hidden">
    <div id="resp-content"><p class="empty">Loading…</p></div>
  </div>
</div>

<!-- TALLY FOOTER -->
<div class="tally" id="tally">
  <div class="inner">
    <span class="chip b">Billable <b id="tBill">0</b>h</span>
    <span class="chip n">Non-billable <b id="tNon">0</b>h</span>
    <span class="chip t">Total <b id="tTot">0</b>h</span>
    <span class="grow"></span>
    <button class="submit" id="submitBtn" onclick="submitForm()">Submit</button>
  </div>
</div>

<script>
const HOURS_B = [0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8];
const HOURS_N = [0,0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8];
const NB_TYPES = ["None","Admin","Internal meeting","Training","Support","Travel","Other"];
const MATCH = ["Yes, as scheduled","Partly","No — different work","Was scheduled but didn't happen"];
let pCount = 0;
const MAX_P = 5;

// ---- backend: Google Apps Script (google.script.run) ----
const IS_GAS = typeof google !== 'undefined' && google.script && google.script.run;
function gs(fn){
  const args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject){
    if(!IS_GAS){ reject(new Error('Not connected to the backend')); return; }
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function(err){
        reject(err instanceof Error ? err : new Error((err && err.message) || String(err)));
      })[fn].apply(null, args);
  });
}

function hourOpts(arr){
  return '<option value="">Select…</option>' +
    arr.map(h=>`<option value="${h}">${h}</option>`).join('') +
    '<option value="__other">Other…</option>';
}

function addProject(){
  if(pCount>=MAX_P) return;
  pCount++;
  const i=pCount;
  const div=document.createElement('div');
  div.className='card proj';
  div.id='proj-'+i;
  div.innerHTML=`
    <div class="proj-head">
      <span class="proj-tag">Project ${i}</span>
      ${i>1?`<button class="remove" onclick="removeProject(${i})">Remove</button>`:''}
    </div>
    <div class="row">
      <div class="field"><label class="req">Project name</label>
        <input data-f="project" placeholder="e.g. Cloud Migration"></div>
      <div class="field"><label class="req">Customer name</label>
        <input data-f="customer" placeholder="e.g. Connect Credit Union"></div>
    </div>
    <div class="row hours-pair">
      <div class="field"><label class="req">Billable hours</label>
        <select data-f="bill" onchange="otherHours(this);recalc()">${hourOpts(HOURS_B)}</select>
        <input class="otherbox hidden" type="number" step="0.25" min="0" data-f="billOther"
          placeholder="hours" oninput="recalc()"></div>
      <div class="field"><label>Non-billable hours</label>
        <select data-f="non" onchange="otherHours(this);recalc()">${hourOpts(HOURS_N)}</select>
        <input class="otherbox hidden" type="number" step="0.25" min="0" data-f="nonOther"
          placeholder="hours" oninput="recalc()"></div>
    </div>
    <div class="field"><label>Type of non-billable time</label>
      <select data-f="nbtype">${NB_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
    <div class="field"><label>Did this match your Float schedule?</label>
      <select data-f="match"><option value="">—</option>${MATCH.map(m=>`<option>${m}</option>`).join('')}</select></div>
    <div class="field"><label>Notes / explanation</label>
      <textarea data-f="notes" placeholder="Anything that didn't go to plan, blockers, or why it couldn't be finished"></textarea></div>
  `;
  document.getElementById('projects').appendChild(div);
  document.getElementById('addBtn').disabled = pCount>=MAX_P;
  recalc();
}

function removeProject(i){
  const el=document.getElementById('proj-'+i);
  if(el) el.remove();
  document.getElementById('addBtn').disabled=false;
  recalc();
}

function otherHours(sel){
  const other=sel.parentElement.querySelector('.otherbox');
  if(sel.value==='__other'){other.classList.remove('hidden');}
  else{other.classList.add('hidden');other.value='';}
}
function toggleOtherName(){
  const o=document.getElementById('engOther');
  document.getElementById('eng').value==='__other'?o.classList.remove('hidden'):o.classList.add('hidden');
}

function hv(sel,otherSel){
  const v=sel.value;
  if(v==='__other'){const o=parseFloat(otherSel.value);return isNaN(o)?0:o;}
  return v===''?0:parseFloat(v);
}
function recalc(){
  let b=0,n=0;
  document.querySelectorAll('.proj').forEach(p=>{
    b+=hv(p.querySelector('[data-f=bill]'),p.querySelector('[data-f=billOther]'));
    n+=hv(p.querySelector('[data-f=non]'),p.querySelector('[data-f=nonOther]'));
  });
  const r=x=>Math.round(x*100)/100;
  document.getElementById('tBill').textContent=r(b);
  document.getElementById('tNon').textContent=r(n);
  document.getElementById('tTot').textContent=r(b+n);
}

function collect(){
  const engSel=document.getElementById('eng').value;
  const eng = engSel==='__other'?document.getElementById('engOther').value.trim():engSel;
  const date=document.getElementById('date').value;
  const projects=[];
  document.querySelectorAll('.proj').forEach(p=>{
    const g=f=>p.querySelector(`[data-f=${f}]`);
    projects.push({
      project:g('project').value.trim(),
      customer:g('customer').value.trim(),
      bill:hv(g('bill'),g('billOther')),
      non:hv(g('non'),g('nonOther')),
      nbtype:g('nbtype').value,
      match:g('match').value,
      notes:g('notes').value.trim()
    });
  });
  return {eng,date,projects};
}

async function submitForm(){
  const err=document.getElementById('formErr');
  err.style.display='none';
  const d=collect();
  if(!d.eng){return showErr('Please select your name.');}
  if(!d.date){return showErr('Please pick a date.');}
  if(d.projects.length===0){return showErr('Add at least one project.');}
  for(let i=0;i<d.projects.length;i++){
    const p=d.projects[i];
    if(!p.project||!p.customer) return showErr(`Project ${i+1}: project and customer name are required.`);
    if(p.bill===0 && p.non===0) return showErr(`Project ${i+1}: enter billable or non-billable hours.`);
  }
  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='Saving…';
  try{
    await gs('submitTimesheet', d);
    showSuccess(d);
  }catch(e){
    btn.disabled=false; btn.textContent='Submit';
    showErr('Could not save — please try again.');
  }
}
function showErr(m){const e=document.getElementById('formErr');e.textContent=m;e.style.display='block';
  e.scrollIntoView({behavior:'smooth',block:'center'});return false;}

function showSuccess(d){
  document.getElementById('form-area').classList.add('hidden');
  document.getElementById('tally').classList.add('hidden');
  const s=document.getElementById('success');
  const tot=d.projects.reduce((a,p)=>a+p.bill+p.non,0);
  s.className='card success';
  s.innerHTML=`<div class="tick">✓</div><h2>Logged, thanks ${escapeHtml(d.eng.split(' ')[0])}!</h2>
    <p class="hint">${d.projects.length} project${d.projects.length>1?'s':''} · ${Math.round(tot*100)/100}h recorded for ${d.date}.</p>
    <p style="margin-top:16px"><button class="submit" onclick="resetForm()">Log another day</button></p>`;
}
function resetForm(){
  document.getElementById('projects').innerHTML='';
  document.getElementById('success').className='hidden';
  document.getElementById('form-area').classList.remove('hidden');
  document.getElementById('tally').classList.remove('hidden');
  const b=document.getElementById('submitBtn');b.disabled=false;b.textContent='Submit';
  pCount=0; document.getElementById('addBtn').disabled=false;
  addProject(); recalc();
}

function setView(v){
  const log=v==='log';
  document.getElementById('view-log').classList.toggle('hidden',!log);
  document.getElementById('view-resp').classList.toggle('hidden',log);
  document.getElementById('tally').classList.toggle('hidden',!log);
  document.getElementById('tab-log').classList.toggle('active',log);
  document.getElementById('tab-resp').classList.toggle('active',!log);
  document.getElementById('subhead').textContent = log
    ? 'Log what you worked on today — takes about a minute.'
    : 'Submissions collected from the team (admin view).';
  if(!log) loadResponses();
}

function renderKeyGate(msg){
  const box=document.getElementById('resp-content');
  box.innerHTML=`<div class="card" style="max-width:420px">
    <div class="field"><label class="req" for="adminKeyIn">Admin key</label>
      <input type="password" id="adminKeyIn" placeholder="Enter admin key"
        onkeydown="if(event.key==='Enter')unlockResponses()">
      ${msg?`<p class="err" style="display:block">${escapeHtml(msg)}</p>`:''}
      <p class="hint">The admin key is set in Code.gs (ADMIN_KEY) and is only needed to view responses.</p></div>
    <button class="submit" onclick="unlockResponses()">View responses</button>
  </div>`;
}
function unlockResponses(){
  const v=document.getElementById('adminKeyIn').value.trim();
  if(!v) return;
  try{localStorage.setItem('psAdminKey', v);}catch(e){window._key=v;}
  loadResponses();
}
function getKey(){
  try{return localStorage.getItem('psAdminKey')||window._key||'';}
  catch(e){return window._key||'';}
}
function dropKey(){
  try{localStorage.removeItem('psAdminKey');}catch(e){}
  window._key='';
}

async function loadResponses(){
  const box=document.getElementById('resp-content');
  const key=getKey();
  if(!key){renderKeyGate();return;}
  box.innerHTML='<p class="empty">Loading…</p>';
  let rows=[];
  try{
    rows=await gs('getResponses', key);
  }catch(e){
    if(/invalid admin key/i.test(e.message||'')){dropKey();renderKeyGate('Wrong key — try again.');return;}
    box.innerHTML='<p class="empty">Could not load responses.</p>';return;
  }
  if(rows.length===0){box.innerHTML='<p class="empty">No submissions yet. They\'ll appear here as the team replies.</p>';return;}
  rows.sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||''));

  let tb=0,tn=0; const engs=new Set();
  rows.forEach(r=>{engs.add(r.eng);tb+=r.bill;tn+=r.non;});
  const r2=x=>Math.round(x*100)/100;

  let html=`<div class="stat-row">
    <div class="stat"><div class="n">${engs.size}</div><div class="l">Engineers</div></div>
    <div class="stat"><div class="n">${r2(tb)}h</div><div class="l">Billable</div></div>
    <div class="stat"><div class="n">${r2(tn)}h</div><div class="l">Non-billable</div></div>
    <div class="stat"><div class="n">${rows.length}</div><div class="l">Project entries</div></div>
  </div>
  <div class="toolbar">
    <button class="btn" onclick="loadResponses()">Refresh</button>
    <button class="btn" onclick="downloadCSV()">Download CSV</button>
    <button class="btn warn" onclick="clearAll(this)">Clear all</button>
  </div>
  <div class="tbl-wrap"><table><thead><tr>
    <th>Date</th><th>Engineer</th><th>Project</th><th>Customer</th>
    <th>Bill</th><th>Non-bill</th><th>NB type</th><th>Matched?</th><th>Notes</th>
  </tr></thead><tbody>`;
  rows.forEach(r=>{
    html+=`<tr><td>${escapeHtml(r.date)}</td><td>${escapeHtml(r.eng)}</td>
    <td>${escapeHtml(r.project)}</td><td>${escapeHtml(r.customer)}</td>
    <td>${r.bill||''}</td><td>${r.non||''}</td><td>${escapeHtml(r.nbtype||'')}</td>
    <td>${escapeHtml(r.match||'')}</td><td>${escapeHtml(r.notes||'')}</td></tr>`;
  });
  html+='</tbody></table></div>';
  box.innerHTML=html;
  window._rows=rows;
}

function downloadCSV(){
  const rows=window._rows||[];
  const head=['Date','Engineer','Project','Customer','Billable Hrs','Non-Billable Hrs','Non-Billable Type','Matched Schedule','Notes','Submitted At'];
  const lines=[head.join(',')];
  rows.forEach(r=>{
    lines.push([r.date,r.eng,r.project,r.customer,r.bill,r.non,r.nbtype||'',r.match||'',r.notes||'',r.submittedAt]
      .map(csv).join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ps_time_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
function csv(v){v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}

// confirm() can be blocked inside the Apps Script iframe, so use a two-step button instead
let clearArmed=false;
async function clearAll(btn){
  if(!clearArmed){
    clearArmed=true;
    btn.textContent='Really delete ALL?';
    setTimeout(()=>{clearArmed=false;btn.textContent='Clear all';},4000);
    return;
  }
  clearArmed=false;
  btn.disabled=true; btn.textContent='Deleting…';
  try{await gs('clearAllResponses', getKey());}catch(e){}
  loadResponses();
}

function escapeHtml(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// init
document.getElementById('date').value=new Date().toISOString().slice(0,10);
if(!IS_GAS) document.getElementById('offline-warn').classList.remove('hidden');
addProject();
</script>
</body>
</html>
